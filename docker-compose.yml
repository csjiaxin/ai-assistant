version: "3.9"

services:

  # ── Main Agent ──────────────────────────────────────────────────────
  agent:
    build: .
    command: python main.py serve
    env_file: .env
    volumes:
      - ./data:/app/data          # persist ChromaDB + SQLite
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"               # Prometheus metrics
    healthcheck:
      test: ["CMD", "python", "-c", "import agent"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (optional — swap for chroma by default) ─────────────────
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    profiles: ["monitoring"]     # start with: docker compose --profile monitoring up

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    profiles: ["monitoring"]

volumes:
  redis_data:
  grafana_data:
  # qdrant_data:
